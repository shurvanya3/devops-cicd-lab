name: CI Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.10"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Копирование репозитория
        uses: actions/checkout@v4

      - name: Установка Python c кэшированием
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ./app/requirements.txt

      - name: Установка уязвимостей
        run: pip install -r requirements.txt

      - name: Архивирование результатов сборки
        uses: actions/upload-artifact@v4
        with:
          name: app-code-artifact
          path: ./app/
          retention-days: 1

  linting:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Копирование репозитория
        uses: actions/checkout@v4

      - name: Установка Python c кэшированием
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ./app/requirements.txt

      - name: Установка линтера (Ruff)
        run: pip install ruff

      - name: Запуск линтера (Ruff)
        run: ruff check .


  testing:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Копирование репозитория
        uses: actions/checkout@v4

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ./app/requirements.txt

      - name: Установка зависимостей и тестера (Pytest)
        run: |
          cd app
          pip install -r requirements.txt pytest

      - name: Запуск тестера (Pytest)
        run: |
          cd app
          pytest --junitxml=test-report.xml

      - name: Сохранение результатов тестов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: ./app/test-report.xml

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Копирование репозитория
        uses: actions/checkout@v4

      - name: Установка Python c кэшированием
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ./app/requirements.txt

      - name: Установка pip-audit
        run: pip install pip-audit

      - name: Сканирование зависимостей на уязвимости
        run: pip-audit -r requirements.txt

  quality-gate:
    needs: [linting, testing, security-scan]
    runs-on: ubuntu-latest

    steps:
      - name: Проверка предыдущих этапов
        run: echo "All checks passed"

  docker-build:
    needs: quality-gate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Копирование репозитория
        uses: actions/checkout@v4

      - name: Настройка Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Логин в GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Извлечение метаданных (тегирование)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: type=sha,format=long

      - name: Сборка и отправка Docker-образа
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
