name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Симуляция деплоя на staging
        run: |
          echo "Deploying the new image: ghcr.io/${{ github.repository }}:${{ github.event.workflow_run.head_sha }}"
          echo "Correcting environment variables for testing area..."
          echo "The staging server successfully updated!"

  smoke-test:
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - name: Запуск Smoke тестов
        run: |
          echo "Examing app accessability..."
          echo "Calling the GET /health endpoint... Status: 200 OK"
          echo "Calling the GET / endpoint... Status: 200 OK "
          echo "Smoke test successfully passed. Application is stable!"

  deploy-production:
    needs: smoke-test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Симуляция деплоя на production
        run: |
          echo "Deploying passed image to Production: ghcr.io/${{ github.repository }}:${{ github.event.workflow_run.head_sha }}"
          echo "Applying production server configuration"
          echo "Production successfully updated and available for users1!"
